files: ^cycles/
default_language_version:
  python: python3
  node: "24.13.0"
repos:
  - repo: https://github.com/OCA/odoo-pre-commit-hooks
    rev: v0.1.4
    hooks:
      - id: oca-checks-po
        args:
          - --config=.oca_hooks-autofix.cfg
          - --fix
  - repo: https://github.com/psf/black-pre-commit-mirror.git
    rev: 23.12.1
    hooks:
      - id: black
  - repo: https://github.com/myint/autoflake
    rev: v2.2.1
    hooks:
      - id: autoflake
        args:
          - --expand-star-imports
          - --ignore-init-module-imports
          - --in-place
          - --remove-all-unused-imports
          - --remove-duplicate-keys
          - --remove-unused-variables
  - repo: local
    hooks:
      - id: prettier
        name: prettier (with plugin-xml)
        entry: prettier
        args:
          - --write
          - --list-different
          - --ignore-unknown
          # use this specific name because it is already listed in our .gitignore
          - --config=.eslintrc_prettier.config.cjs
        types: [text]
        files: \.(js|xml)$
        language: node
        additional_dependencies:
          - "prettier@2.7.1"
          - "@prettier/plugin-xml@2.2.0"
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        # exclude autogenerated files
        exclude: \.pot?$
      - id: end-of-file-fixer
        # exclude autogenerated files
        exclude: \.pot?$
      - id: mixed-line-ending
        args: ["--fix=lf"]
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: ["--keep-percent-format"]
  - repo: https://github.com/PyCQA/isort
    rev: 7.0.0
    hooks:
      - id: isort
        args: ["--profile", "black"]
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: remove-tabs
        exclude: (Makefile|debian/rules|.gitmodules|\.po|\.pot)(\.in)?$
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.39.1
    hooks:
      - id: eslint
        name: javascript lints autofix
        args:
          - --color
          - --config=.eslintrc.config.mjs
          - --fix
