files: ^cycles/
default_language_version:
  python: python3
  node: "24.13.0"
repos:
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        name: flake8 mandatory checks
  - repo: https://github.com/OCA/pylint-odoo
    rev: v9.3.22
    hooks:
      - id: pylint_odoo
        name: pylint mandatory checks
        args:
          - --rcfile=.pylintrc
          - --disable=R0000
          # uncomment after fix https://github.com/OCA/pylint-odoo/pull/512
          # - --jobs=0  # 0 will auto-detect the number of processors available to use
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.39.1
    hooks:
      - id: eslint
        name: javascript mandatory checks
        args:
          - --color
          - --config=.eslintrc.config.mjs
  - repo: local
    hooks:
      - id: name-non-ascii
        name: Use only ASCII (no accents or special characters) for filenames and directory names
        description: It may raise errors on OS without locale settings configured
        entry: Use only ASCII (no accents or special characters) for filenames and directory names
        language: fail
        files: '[^\x00-\x7F]'
      - id: vx-check-deactivate
        name: deactivate.jinja and neutralize.sql syntax check.
        description: Validate deactivate.jinja and neutralize.sql files' syntax.
        entry: vx-check-deactivate
        args: []
        language: python
        types: [text]
        files: (^deactivate\.jinja$|/data/neutralize\.sql$)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
        # exclude files where underlines are not distinguishable from merge conflicts
        exclude: /README\.rst$|^docs/.*\.rst$
      - id: check-symlinks
      - id: check-xml
      - id: debug-statements
